<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SLICE Index — The changing meaning of a dollar</title>
    <meta name="description" content="SLICE Index: a multi-lens calculator for understanding what historical USD amounts meant — through CPI, wage hours, GDP per capita (SLICE), and share of national output." />
    <link rel="icon" href="slice-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        --bg: #fafaf7;
        --surface: #ffffff;
        --ink: #111111;
        --ink-soft: rgba(17,17,17,0.62);
        --ink-mute: rgba(17,17,17,0.42);
        --ink-faint: rgba(17,17,17,0.18);
        --rule: rgba(17,17,17,0.08);
        --rule-soft: rgba(17,17,17,0.05);
        --cheap: #1f6b3a;
        --exp: #a84f1f;
      }
      html, body {
        background: var(--bg);
        color: var(--ink);
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-feature-settings: "ss01", "cv11";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      .serif { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; letter-spacing: -0.015em; }
      .panel { background: var(--surface); border: 1px solid var(--rule); border-radius: 20px; }
      .soft  { background: var(--surface); border: 1px solid var(--rule-soft); border-radius: 16px; }
      .field {
        background: var(--surface);
        border: 1px solid var(--ink-faint);
        border-radius: 12px;
        padding: 10px 14px;
        font-variant-numeric: tabular-nums;
        transition: border-color 120ms ease, box-shadow 120ms ease;
        width: 100%;
      }
      .field:hover { border-color: var(--ink-soft); }
      .field:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(17,17,17,0.06); }
      .btn {
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--ink-faint);
        border-radius: 12px;
        padding: 8px 14px;
        font-weight: 500;
        font-size: 14px;
        transition: all 140ms ease;
        cursor: pointer;
      }
      .btn:hover { border-color: var(--ink); background: var(--ink); color: var(--surface); }
      .btn-ghost {
        background: transparent;
        border: none;
        padding: 6px 10px;
        color: var(--ink-soft);
        font-weight: 500;
        font-size: 14px;
        cursor: pointer;
        transition: color 120ms;
      }
      .btn-ghost:hover { color: var(--ink); }
      .tab {
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        transition: all 150ms ease;
        cursor: pointer;
        border: none;
      }
      .tab-on  { background: var(--ink); color: var(--surface); }
      .tab-off { background: transparent; color: var(--ink-soft); }
      .tab-off:hover { color: var(--ink); }
      .rule      { border-top: 1px solid var(--rule); }
      .rule-soft { border-top: 1px solid var(--rule-soft); }
      .muted   { color: var(--ink-soft); }
      .subtle  { color: var(--ink-mute); }
      .badge {
        display: inline-block;
        background: rgba(17,17,17,0.06);
        color: var(--ink-soft);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 12px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--rule);
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-soft);
      }
      .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--ink); display: inline-block; }
      .num     { font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
      .display { font-family: 'Fraunces', Georgia, serif; font-variant-numeric: tabular-nums; letter-spacing: -0.025em; font-weight: 500; }
      .grad    { background: linear-gradient(180deg, rgba(17,17,17,0.025) 0%, transparent 100%); }
      .elev-bg { background: rgba(250,250,247,0.85); }
      a { color: inherit; text-decoration: underline; text-decoration-color: var(--ink-faint); text-underline-offset: 3px; transition: text-decoration-color 120ms; }
      a:hover { text-decoration-color: var(--ink); }
      .bar {
        background: var(--rule-soft);
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: var(--ink);
        transition: width 600ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .bar-fill.cheap { background: var(--cheap); }
      .bar-fill.exp   { background: var(--exp); }
      .lens-card { transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease; }
      .lens-card:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(17,17,17,0.05); border-color: var(--rule); }
      input[type=number]::-webkit-outer-spin-button,
      input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      input[type=number] { -moz-appearance: textfield; }
      ::selection { background: rgba(17,17,17,0.12); }
      @media (prefers-color-scheme: dark) {
        html, body { background: var(--bg); color: var(--ink); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react" src="app.js"></script>
    <script type="text/babel" data-presets="react">
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(window.SliceIndexCalculator));
    </script>
  </body>
</html>
